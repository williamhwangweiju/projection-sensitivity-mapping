# ============================================================================
# LAMMIE (2026) PAPER-FIDELITY CONFIGURATION
# "Heterogeneous Mapping for Analog In-Memory Computing Accelerators:
#  A Unified Workflow"
# ============================================================================

# ============================================================================
# MODEL PARAMETERS
# ============================================================================
model:
  name: gpt2
  device: cpu

# ============================================================================
# DATASET PARAMETERS
# ============================================================================
dataset:
  name: Salesforce/wikitext
  config: wikitext-103-raw-v1
  split: test
  max_tokens: null
  sequence_length: 1024
  stride: 1024
  batch_size: 1
  document_separator: "\n\n"
  drop_incomplete_final_sequence: true

# ============================================================================
# PROFILING PARAMETERS
# Keys in this section are read directly by the updated profiler.
# ============================================================================
profiling:
  include_lm_head: true
  
  clip_sigma: 2.5
  tile_size: 512
  adc_dac_bits: 8
  programming_noise_sigma: 0.023

  num_seeds: 10
  seed_stride: 1
  profile_blocks: [11]

experiment:
  seed: 42
  save_dir: ./data/results
  results_filename_prefix: programming_noise_sensitivity