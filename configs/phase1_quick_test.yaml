# Quick test configuration for Phase 1

model:
  name: "gpt2"  # Smaller model for testing
  pretrained: true
  device: "cpu"

dataset:
  name: "wikitext"
  split: "wikitext-2"
  batch_size: 2
  max_tokens: 256  # Very small for testing

profiling:
  noise_std_start: 0.0
  noise_std_end: 0.05  # Max noise std
  noise_levels: 5
  num_seeds: 1  # Single seed for quick test
  normalize: false

evaluation:
  metrics:
    - "perplexity"
    - "sensitivity"
  log_interval: 10

experiment:
  name: "phase1_quick_test"
  seed: 42
  num_timesteps: 100
  degradation_scenario: "gradual"
  save_dir: "./results"
