# ============================================================================
# AIHWKIT DEFAULT-CONFIGURATION PROFILING
# ============================================================================
# The analog hardware configuration is created entirely from:
#
#     InferenceRPUConfig()
#
# No ADC/DAC, clipping, mapping, programming-noise, drift, or device
# parameters are overridden in this YAML.
# ============================================================================

# ============================================================================
# MODEL
# ============================================================================
model:
  name: gpt2
  device: cpu

# ============================================================================
# DATASET
# ============================================================================
dataset:
  name: Salesforce/wikitext
  config: wikitext-103-raw-v1
  split: test

  max_tokens: 4096
  sequence_length: 512
  stride: 512
  batch_size: 1

  document_separator: "\n\n"
  drop_incomplete_final_sequence: true

# ============================================================================
# PROFILING
# ============================================================================
profiling:
  # Number of independent calls to AIHWKIT weight programming.
  num_seeds: 1

  # Difference between consecutive realization seeds.
  seed_stride: 1

  # Transformer blocks to profile.
  # Selecting block 11 also profiles lm_head.
  profile_blocks: [11]

# ============================================================================
# EXPERIMENT
# ============================================================================
experiment:
  seed: 42
  save_dir: ./data/results
  results_filename_prefix: aihwkit_defaults_only
